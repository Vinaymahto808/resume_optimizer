    <!-- Abstract continuous knot: overlapping figure-8 infinity form -->
    <path d="M 0,-40 C 35,-40 50,-20 35,0 C 20,20 0,10 0,0 C 0,-10 -20,-20 -35,0 C -50,20 -35,40 0,40" />
    <path d="M 0,-40 C -35,-40 -50,-20 -35,0 C -20,20 0,10 0,0 C 0,-10 20,-20 35,0 C 50,20 35,40 0,40" />
