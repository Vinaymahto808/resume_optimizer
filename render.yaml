services:
  - type: web
    name: ats-resume-checker-api
    env: python
    region: oregon
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ats-resume-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:8000,https://resume-optimizer-frontend.onrender.com,https://api.profileotimizer.online,https://www.profileotimizer.online,https://profileotimizer.online
      - key: RUN_ENV
        value: production
      - key: FRONTEND_URL
        value: https://www.profileotimizer.online
      - key: RESEND_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: ProfileOptimizer

  - type: web
    name: ats-resume-checker-frontend
    env: static
    region: oregon
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://api.profileotimizer.online
      - key: VITE_GTM_ID
        value: GTM-PHXK9HX
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ats-resume-db
    region: oregon
    plan: free
    databaseName: ats_resume
    ipAllowList: []
